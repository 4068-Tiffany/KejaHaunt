<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map View | KejaHaunt</title>
  <meta name="description" content="Browse Nairobi student housing zones on an interactive KejaHaunt map view.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="map">
  <div class="site-shell">
    <header class="site-header">
      <div class="brand-lockup">
        <a class="brand" href="index.html">
          <span class="brand-mark">KH</span>
          <span>
            <strong>KejaHaunt</strong>
            <small>Student Housing Intelligence</small>
          </span>
        </a>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a class="active" href="map.html">Map</a>
        <a href="guide.html">Guide</a>
      </nav>
    </header>

    <main>
      <section class="page-intro">
        <p class="eyebrow">Map View</p>
        <h1>See where each student zone sits in the bigger picture.</h1>
        <p>This is a product-style map view for discovery. Later, we can replace the stylized zone map with a real map and listing markers.</p>
      </section>

      <section class="map-layout">
        <div class="map-board">
          <div class="map-toolbar">
            <span class="map-pill">Nairobi field map</span>
            <span class="map-pill">Student zones</span>
          </div>
          <div class="map-surface real-map" id="mapSurface"></div>
        </div>
        <aside class="map-detail" id="mapDetail"></aside>
      </section>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
